<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYNAR LAB // EXP-007</title>
  <link rel="stylesheet" href="../assets/css/core.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      border: 1px solid rgba(192,21,42,0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease;
      mix-blend-mode: screen;
    }

    .cursor-ring {
      position: fixed;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(200,208,216,0.2);
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      transition: all 0.15s ease;
      mix-blend-mode: screen;
    }

    /* Header */
    .exp-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    }

    .exp-header__left { display: flex; flex-direction: column; gap: 1px; }
    .exp-header__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(192,21,42,0.9); letter-spacing: 0.3em; }
    .exp-header__name { font-family: 'Chakra Petch', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(232,237,242,0.9); }
    .exp-back { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(168,178,188,0.6); text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s; }
    .exp-back:hover { color: rgba(200,208,216,0.9); }

    /* Bottom controls */
    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
      align-items: center;
    }

    .ctrl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(58,64,74,0.8);
      border: 1px solid rgba(30,30,46,0.6);
      padding: 7px 14px;
      background: rgba(6,6,10,0.5);
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .ctrl:hover, .ctrl.active {
      color: rgba(192,21,42,0.9);
      border-color: rgba(192,21,42,0.4);
    }

    /* Intro overlay */
    .intro {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.8s ease;
    }

    .intro.fade { opacity: 0; pointer-events: none; }

    .intro__title {
      font-family: 'Chakra Petch', sans-serif;
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
    }

    .intro__title span { color: #c0152a; }

    .intro__sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(168,178,188,0.5);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
    }

    .intro__hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(192,21,42,0.7);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 32px;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <header class="exp-header">
    <div class="exp-header__left">
      <div class="exp-header__id">EXP-007</div>
      <div class="exp-header__name">The Layer</div>
    </div>
    <a href="index.html" class="exp-back">← Back to Lab</a>
  </header>

  <div class="controls">
    <button class="ctrl active" id="modeFluid"   onclick="setMode('fluid',this)">FLUID</button>
    <button class="ctrl"        id="modeWeb"     onclick="setMode('web',this)">WEB</button>
    <button class="ctrl"        id="modeExplo"   onclick="setMode('explode',this)">EXPLODE</button>
    <button class="ctrl"        id="modeVortex"  onclick="setMode('vortex',this)">VORTEX</button>
    <button class="ctrl"        id="modeGravity" onclick="setMode('gravity',this)">GRAVITY</button>
  </div>

  <!-- Intro -->
  <div class="intro" id="intro">
    <div class="intro__title">THE <span>LAYER</span></div>
    <div class="intro__sub">EXP-007 // Interactive Fluid Simulation</div>
    <div class="intro__hint">Touch or move to enter</div>
  </div>

  <script>
  // ================================================================
  // THE LAYER — Fluid particle system
  // Five distinct modes, all fully reactive to cursor/touch
  // ================================================================

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const cursor     = document.getElementById('cursor');
  const cursorRing = document.getElementById('cursorRing');
  const intro      = document.getElementById('intro');

  let W, H, mouse = { x: -9999, y: -9999, vx: 0, vy: 0, px: -9999, py: -9999, down: false };
  let mode = 'fluid';
  let particles = [];
  let frame = 0;
  let introGone = false;

  // ---- Resize ----
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); init(); });

  // ---- Mouse / Touch ----
  function updateMouse(x, y) {
    mouse.vx = x - mouse.px;
    mouse.vy = y - mouse.py;
    mouse.px = mouse.x;
    mouse.py = mouse.y;
    mouse.x  = x;
    mouse.y  = y;

    cursor.style.left = x + 'px';
    cursor.style.top  = y + 'px';
    cursorRing.style.left = x + 'px';
    cursorRing.style.top  = y + 'px';

    if (!introGone) {
      introGone = true;
      intro.classList.add('fade');
      setTimeout(() => intro.remove(), 900);
    }
  }

  window.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
  window.addEventListener('mousedown', () => { mouse.down = true; cursor.style.transform = 'translate(-50%,-50%) scale(2)'; cursorRing.style.transform = 'translate(-50%,-50%) scale(0.5)'; });
  window.addEventListener('mouseup',   () => { mouse.down = false; cursor.style.transform = 'translate(-50%,-50%) scale(1)'; cursorRing.style.transform = 'translate(-50%,-50%) scale(1)'; });
  window.addEventListener('touchmove', e => { e.preventDefault(); updateMouse(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  window.addEventListener('touchstart', e => { mouse.down = true; updateMouse(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  window.addEventListener('touchend', () => { mouse.down = false; });

  // ---- Colour palette ----
  const CRIMSON = [192, 21, 42];
  const SILVER  = [200, 208, 216];
  const DARK    = [14, 14, 22];
  const WHITE   = [240, 240, 255];

  function lerpColor(a, b, t) {
    return [
      Math.round(a[0] + (b[0]-a[0])*t),
      Math.round(a[1] + (b[1]-a[1])*t),
      Math.round(a[2] + (b[2]-a[2])*t),
    ];
  }

  // ================================================================
  // PARTICLE CLASS
  // ================================================================
  class Particle {
    constructor(i, total) {
      this.i = i;
      this.total = total;
      this.reset(true);
    }

    reset(initial = false) {
      if (mode === 'web') {
        this.x  = Math.random() * W;
        this.y  = Math.random() * H;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
      } else if (mode === 'explode') {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        this.x  = mouse.x > 0 ? mouse.x : W/2;
        this.y  = mouse.y > 0 ? mouse.y : H/2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
      } else if (mode === 'vortex') {
        this.x  = Math.random() * W;
        this.y  = Math.random() * H;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
      } else if (mode === 'gravity') {
        this.x  = Math.random() * W;
        this.y  = -10;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = Math.random() * 2;
      } else {
        // fluid
        this.x  = initial ? Math.random() * W : Math.random() * W;
        this.y  = initial ? Math.random() * H : -20;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = Math.random() * 0.5 + 0.1;
      }

      this.ax = 0;
      this.ay = 0;
      this.life    = 1;
      this.decay   = Math.random() * 0.004 + 0.001;
      this.size    = Math.random() * 2.5 + 0.5;
      this.baseSize = this.size;

      // Colour
      const t = this.i / this.total;
      if (t < 0.6) {
        const blend = Math.random();
        this.rgb = lerpColor(CRIMSON, SILVER, blend * 0.3);
      } else {
        this.rgb = lerpColor(SILVER, DARK, Math.random() * 0.7);
      }
      this.alpha = Math.random() * 0.6 + 0.3;
    }

    update() {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const distSq = dist * dist;

      if (mode === 'fluid') {
        // Fluid — drawn toward cursor, trails behind
        if (dist < 200) {
          const force = (200 - dist) / 200;
          this.ax += (dx/dist) * force * 0.8;
          this.ay += (dy/dist) * force * 0.8;
        }
        if (dist < 60 && mouse.down) {
          this.ax += mouse.vx * 0.3;
          this.ay += mouse.vy * 0.3;
        }
        this.vx = (this.vx + this.ax) * 0.94;
        this.vy = (this.vy + this.ay) * 0.94 + 0.02;
        this.size = this.baseSize * (1 + Math.min(Math.sqrt(this.vx*this.vx+this.vy*this.vy) * 0.3, 3));

      } else if (mode === 'web') {
        // Web — drift, repel on close
        if (dist < 120) {
          const force = (120-dist)/120;
          this.ax -= (dx/dist) * force * 1.2;
          this.ay -= (dy/dist) * force * 1.2;
        }
        this.vx = (this.vx + this.ax) * 0.97;
        this.vy = (this.vy + this.ay) * 0.97;
        // Bounce walls
        if (this.x < 0 || this.x > W) this.vx *= -1;
        if (this.y < 0 || this.y > H) this.vy *= -1;
        this.x = Math.max(0, Math.min(W, this.x));
        this.y = Math.max(0, Math.min(H, this.y));
        this.life -= this.decay * 0.3;

      } else if (mode === 'explode') {
        // Explode from cursor on click, drift outward
        if (mouse.down && dist < 80) {
          const angle = Math.atan2(this.y - mouse.y, this.x - mouse.x);
          this.vx += Math.cos(angle) * 3;
          this.vy += Math.sin(angle) * 3;
        }
        this.vx *= 0.97;
        this.vy *= 0.97;
        this.vy += 0.05;
        this.life -= this.decay;

      } else if (mode === 'vortex') {
        // Vortex around cursor
        const angle = Math.atan2(dy, dx);
        const tangX = -Math.sin(angle);
        const tangY =  Math.cos(angle);
        const pull  = Math.min(3000 / (distSq + 1), 2);
        const spin  = Math.min(8000 / (distSq + 1), 3);
        this.ax = tangX * spin + (dx/dist) * pull;
        this.ay = tangY * spin + (dy/dist) * pull;
        this.vx = (this.vx + this.ax) * 0.95;
        this.vy = (this.vy + this.ay) * 0.95;
        this.life -= this.decay * 0.5;

      } else if (mode === 'gravity') {
        // Gravity well — sucked toward cursor
        const force = Math.min(20000 / (distSq + 100), 4);
        this.ax = (dx/dist) * force;
        this.ay = (dy/dist) * force + 0.1;
        this.vx = (this.vx + this.ax) * 0.96;
        this.vy = (this.vy + this.ay) * 0.96;
        // Absorbed
        if (dist < 15) { this.life = 0; }
        this.life -= this.decay * 0.4;
      }

      this.ax *= 0.1;
      this.ay *= 0.1;
      this.x += this.vx;
      this.y += this.vy;

      if (mode !== 'web') {
        if (this.life <= 0 || this.x < -50 || this.x > W+50 || this.y > H+50) {
          this.reset(false);
        }
      }
    }

    draw() {
      const a = this.life * this.alpha;
      if (a <= 0.01) return;
      const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      const stretch = Math.min(speed * 1.5, 8);

      ctx.save();
      if (stretch > 1) {
        ctx.translate(this.x, this.y);
        ctx.rotate(Math.atan2(this.vy, this.vx));
        ctx.scale(1 + stretch * 0.3, 1);
        ctx.translate(-this.x, -this.y);
      }

      const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size + stretch);
      grd.addColorStop(0, `rgba(${this.rgb[0]},${this.rgb[1]},${this.rgb[2]},${a})`);
      grd.addColorStop(1, `rgba(${this.rgb[0]},${this.rgb[1]},${this.rgb[2]},0)`);

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size + stretch * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.restore();
    }
  }

  // ================================================================
  // WEB MODE — connection lines
  // ================================================================
  function drawWeb() {
    const maxDist = 100;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < maxDist) {
          const alpha = (1 - dist/maxDist) * 0.2 * particles[i].life * particles[j].life;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(192,21,42,${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  // ================================================================
  // INIT
  // ================================================================
  function init() {
    const count = Math.min(Math.floor(W * H / 3000), 300);
    particles = Array.from({ length: count }, (_, i) => new Particle(i, count));
  }

  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.ctrl').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    init();
  }

  // ================================================================
  // RENDER LOOP
  // ================================================================
  function loop() {
    frame++;

    // Trail effect — different fade per mode
    const trailAlpha = mode === 'web' ? 0.25 : mode === 'vortex' ? 0.08 : mode === 'explode' ? 0.12 : mode === 'gravity' ? 0.05 : 0.15;
    ctx.fillStyle = `rgba(0,0,0,${trailAlpha})`;
    ctx.fillRect(0, 0, W, H);

    if (mode === 'web') drawWeb();

    particles.forEach(p => { p.update(); p.draw(); });

    // Mouse glow
    if (mouse.x > 0) {
      const grd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, mouse.down ? 80 : 40);
      grd.addColorStop(0, 'rgba(192,21,42,0.15)');
      grd.addColorStop(1, 'rgba(192,21,42,0)');
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, mouse.down ? 80 : 40, 0, Math.PI*2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Spawn new particles in explode mode on mouse down
    if (mode === 'explode' && mouse.down && frame % 2 === 0) {
      const p = new Particle(Math.floor(Math.random()*particles.length), particles.length);
      particles[Math.floor(Math.random()*particles.length)] = p;
    }

    requestAnimationFrame(loop);
  }

  init();
  loop();
  </script>
</body>
</html>
